name: Build NPC Index

on:
  push:
    paths:
      - 'NPCs/**'
      - 'build_npc_index.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build npc_index.json
        run: python build_npc_index.py
      - name: Commit npc_index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add npc_index.json
          git diff --cached --quiet || git commit -m "chore: rebuild npc_index.json [skip ci]"
          git push
